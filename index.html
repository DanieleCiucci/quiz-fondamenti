<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Fondamenti di Informatica - eCampus</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    padding: 10px;
    color: #333;
  }
  .container {
    max-width: 800px;
    margin: 0 auto;
  }
  header {
    text-align: center;
    color: white;
    margin-bottom: 20px;
  }
  header h1 { font-size: 1.4rem; margin-bottom: 5px; }
  header p { opacity: 0.9; font-size: 0.85rem; }

  .controls {
    background: white;
    border-radius: 12px;
    padding: 15px;
    margin-bottom: 15px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    align-items: center;
  }
  .controls label { font-size: 0.85rem; font-weight: 600; }
  .controls select, .controls button {
    padding: 8px 12px;
    border-radius: 8px;
    border: 1px solid #ddd;
    font-size: 0.9rem;
    cursor: pointer;
    background: white;
  }
  .controls button {
    background: #667eea;
    color: white;
    border: none;
    font-weight: 600;
  }
  .controls button:hover { background: #5568d3; }

  .stats {
    background: white;
    border-radius: 12px;
    padding: 12px;
    margin-bottom: 15px;
    display: flex;
    justify-content: space-around;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    font-size: 0.9rem;
  }
  .stat { text-align: center; }
  .stat-num { font-size: 1.3rem; font-weight: bold; color: #667eea; }
  .stat-label { font-size: 0.75rem; color: #666; }
  .stat.correct .stat-num { color: #22c55e; }
  .stat.wrong .stat-num { color: #ef4444; }

  .card {
    background: white;
    border-radius: 16px;
    padding: 20px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.15);
    margin-bottom: 15px;
  }
  .card-meta {
    display: flex;
    justify-content: space-between;
    font-size: 0.8rem;
    color: #666;
    margin-bottom: 12px;
    padding-bottom: 10px;
    border-bottom: 1px solid #eee;
  }
  .badge {
    background: #667eea;
    color: white;
    padding: 3px 10px;
    border-radius: 12px;
    font-weight: 600;
  }
  .question {
    font-size: 1rem;
    font-weight: 600;
    margin-bottom: 15px;
    line-height: 1.5;
  }
  .options { display: flex; flex-direction: column; gap: 8px; }
  .option {
    padding: 12px 15px;
    border: 2px solid #e5e7eb;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.2s;
    font-size: 0.95rem;
    line-height: 1.4;
    background: #fafafa;
    user-select: none;
  }
  .option:hover { border-color: #667eea; background: #f0f1ff; }
  .option.selected { border-color: #667eea; background: #e0e3ff; }
  .option.correct {
    border-color: #22c55e;
    background: #d1fae5;
    color: #065f46;
  }
  .option.wrong {
    border-color: #ef4444;
    background: #fee2e2;
    color: #991b1b;
  }
  .option.disabled { cursor: not-allowed; pointer-events: none; }

  .open-question {
    background: #fef3c7;
    border-left: 4px solid #f59e0b;
    padding: 15px;
    border-radius: 8px;
    margin-bottom: 10px;
  }
  .open-question .label {
    font-size: 0.75rem;
    text-transform: uppercase;
    color: #92400e;
    font-weight: bold;
    margin-bottom: 5px;
  }
  .answer-box {
    background: #ecfdf5;
    border-left: 4px solid #10b981;
    padding: 15px;
    border-radius: 8px;
    margin-top: 10px;
    font-size: 0.95rem;
    line-height: 1.6;
    white-space: pre-wrap;
    display: none;
  }
  .answer-box.show { display: block; }
  .answer-box .label {
    font-size: 0.75rem;
    text-transform: uppercase;
    color: #065f46;
    font-weight: bold;
    margin-bottom: 5px;
  }

  .nav {
    display: flex;
    gap: 10px;
    margin-top: 15px;
  }
  .nav button {
    flex: 1;
    padding: 12px;
    border: none;
    border-radius: 10px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-prev { background: #6b7280; color: white; }
  .btn-prev:hover { background: #4b5563; }
  .btn-next { background: #667eea; color: white; }
  .btn-next:hover { background: #5568d3; }
  .btn-show { background: #f59e0b; color: white; }
  .btn-show:hover { background: #d97706; }
  .btn-reset { background: #ef4444; color: white; }
  .btn-reset:hover { background: #dc2626; }

  .progress-bar {
    height: 6px;
    background: #e5e7eb;
    border-radius: 3px;
    overflow: hidden;
    margin-bottom: 15px;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #667eea, #764ba2);
    transition: width 0.3s;
  }

  @media (max-width: 600px) {
    .controls { flex-direction: column; align-items: stretch; }
    .controls select, .controls button { width: 100%; }
    .nav { flex-direction: column; }
    header h1 { font-size: 1.1rem; }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>📚 Fondamenti di Informatica</h1>
    <p>Quiz Flashcard - Università eCampus</p>
  </header>

  <div class="controls">
    <label for="lessonFilter">Lezione:</label>
    <select id="lessonFilter"><option value="all">Tutte</option></select>
    <label for="modeFilter">Tipo:</label>
    <select id="modeFilter">
      <option value="all">Tutte</option>
      <option value="chiuse">Solo chiuse</option>
      <option value="aperte">Solo aperte</option>
    </select>
    <button id="shuffleBtn">🔀 Mescola</button>
    <button id="resetBtn">↺ Reset</button>
  </div>

  <div class="stats">
    <div class="stat"><div class="stat-num" id="sCurrent">0</div><div class="stat-label">Corrente</div></div>
    <div class="stat"><div class="stat-num" id="sTotal">0</div><div class="stat-label">Totali</div></div>
    <div class="stat correct"><div class="stat-num" id="sCorrect">0</div><div class="stat-label">Corrette</div></div>
    <div class="stat wrong"><div class="stat-num" id="sWrong">0</div><div class="stat-label">Sbagliate</div></div>
  </div>

  <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>

  <div class="card" id="card">
    <div class="card-meta">
      <span class="badge" id="badge">Lezione</span>
      <span id="counter">0 / 0</span>
    </div>
    <div id="cardContent"></div>
    <div class="nav">
      <button class="btn-prev" id="prevBtn">⟵ Prec</button>
      <button class="btn-show" id="showBtn">👁 Risposta</button>
      <button class="btn-next" id="nextBtn">Succ ⟶</button>
    </div>
  </div>
</div>

<script src="questions.js"></script>
<script src="questions_pag5799.js"></script>
<script src="questions_pag_99_159.js"></script>
<script src="quiz_lezioni_085_095.js"></script>
<script src="app.js"></script>
</body>
</html>
